defaults:
  - data: parallel_wmt24pp_flores_reversed
  - prompts: translation_dynamic_5
  - model: qwen3_5_4b_cpt_half_lr_stage2
  - finetune: full
  - preprocessing: sft_translation
  - training: gpu96_sft
  - evaluation: gpu96
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "sft-qwen3-5-4b-cpt-half-lr-stage2-reversed"
  output_root: "artifacts/sft_qwen3_5_4b_cpt_half_lr_stage2"
  processed_dir: "data/processed/sft_parallel_reversed"

logging:
  wandb:
    project: "instruction-tuning"
    tags:
      - "sft"
      - "parallel"
      - "qwen3.5-4b-cpt-half-lr-stage2"

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
